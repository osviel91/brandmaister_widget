name: BrandMeisterWidgetKit
options:
  bundleIdPrefix: com.osviel91
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: 5.10
    CODE_SIGN_STYLE: Automatic

targets:
  BrandMeisterMac:
    type: application
    platform: macOS
    sources:
      - path: MacApp
      - path: Shared
    info:
      path: MacApp/Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    entitlements:
      path: MacApp/BrandMeisterMac.entitlements
    settings:
      base:
        PRODUCT_NAME: BrandMeisterMac
        PRODUCT_BUNDLE_IDENTIFIER: com.osviel91.BrandMeisterMac
    dependencies:
      - target: BrandMeisterWidgetExtension
        embed: true

  BrandMeisterWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: WidgetExtension
      - path: Shared
    info:
      path: WidgetExtension/Info.plist
    entitlements:
      path: WidgetExtension/BrandMeisterWidget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.osviel91.BrandMeisterWidgetExtension
        PRODUCT_NAME: BrandMeisterWidgetExtension

schemes:
  BrandMeisterMac:
    build:
      targets:
        BrandMeisterMac: all
        BrandMeisterWidgetExtension: all
    run:
      config: Debug
